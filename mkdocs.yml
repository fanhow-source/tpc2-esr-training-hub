site_name: OAIC ESR AutoDoc Hub
site_description: OAIC ESR automation guides for Training, DPR, 3DLA, MoM and project documentation.
site_author: OAIC ESR Team

theme:
  name: material
  language: en
  logo: assets/oaic-logo.png
  favicon: assets/oaic-logo.png
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Step 0 Setup:
      - English: Step-0-SharePoint-OneDrive-Setup-EN.md
      - 中文: Step-0-SharePoint-OneDrive-Setup-ZH.md
  - 3DLA Overview:
      - English: 3DLA-Overview-AUTO-Quick-Guide-EN.md
      - 中文: 3DLA-Overview-AUTO-Quick-Guide-ZH.md
  - 3DLA MoM:
      - English: 3DLA-MOM-AUTO-Quick-Guide-EN.md
      - 中文: 3DLA-MOM-AUTO-Quick-Guide-ZH.md
  - DPR:
      - English: DPR-AUTO-Quick-Guide-EN.md
      - 中文: DPR-AUTO-Quick-Guide-ZH.md
  - ESR Training:
      - English: ESR-Training-AUTO-Quick-Guide-EN.md
      - 中文: ESR-Training-AUTO-Quick-Guide-ZH.md




markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
